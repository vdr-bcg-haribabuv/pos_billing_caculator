<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator POS FINAL</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px}
.container{max-width:1200px;margin:auto}
.receipt-header{text-align:center;margin-bottom:10px}
.shop-title{font-size:24px;font-weight:900}
.shop-address{font-size:13px;font-weight:700}
.bill-info{font-size:13px;font-weight:800}
.display{background:#1f1f1f;color:#fff;border-radius:12px;padding:20px;text-align:center;font-size:52px;font-weight:900;margin-bottom:15px}
.main{display:grid;grid-template-columns:40% 60%;gap:15px}
.left-panel{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.inputs{display:grid;grid-template-columns:42% 22% 22%;gap:8px}
.inputs input{padding:12px;font-size:24px;font-weight:900;text-align:center;border:2px solid #ddd;border-radius:8px;width:100%;box-sizing:border-box}
.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
button{height:50px;border:none;border-radius:8px;font-size:18px;font-weight:900;cursor:pointer;color:white}
.add{background:#3498db}.print{background:#27ae60}.newbill{background:#8e44ad}

table{width:100%;border-collapse:collapse;background:#fff;border:3px solid #000}
th,td{border:2px solid #000;padding:8px;text-align:center;font-weight:800}

.remove-btn{background:none;border:none;color:red;font-size:18px;font-weight:900;cursor:pointer}
.print-footer,.print-total-row{display:none}

@media print{
.left-panel,.remove-btn,.col-remove{display:none!important;}
body{padding:0;width:72mm;background:#fff;font-size:12px}
.receipt-header{text-align:left}
.shop-title{text-align:center;font-size:24px}
.shop-address{text-align:center}
.bill-info{text-align:left;font-size:14px;font-weight:bold}
.display{display:none}
.main{display:block}
table{width:100%;border-collapse:collapse;table-layout:fixed;border:3px solid #000}
th,td{border:2px solid #000;font-size:14px;padding:3px}
.print-total-row{display:table-row}
.print-footer{display:block;text-align:center;margin-top:8px;font-weight:bold}
}
</style>
</head>
<body>
<div class="container">
<div class="receipt-header">
<div class="shop-title" id="shopName"></div>
<div class="shop-address" id="shopAddress"></div>
<div class="bill-info">Bill No : <span id="billNo"></span><br>Date : <span id="billDate"></span></div>
</div>

<div class="display">₹ <span id="grand">0.00</span></div>

<div class="main">
<div class="left-panel">
<div class="inputs">
<input type="number" id="price" placeholder="Price">
<input type="number" id="qty" value="1">
<input type="number" id="disc" placeholder="Disc %">
</div>
<div class="buttons">
<button class="add" onclick="addItem()">ADD</button>
<button class="print" onclick="printBill()">PRINT</button>
<button class="newbill" onclick="clearBill()">NEW BILL</button>
</div>
</div>

<div>
<table>
<thead><tr id="tableHeader"></tr></thead>
<tbody id="rows"></tbody>
<tfoot>
<tr class="print-total-row">
<td colspan="4" style="text-align:center;font-weight:bold;font-size:15px">
Total: ₹ <span id="grandFooter">0.00</span>
</td>
</tr>
</tfoot>
</table>
<div class="print-footer">Thank You - Visit Again!</div>
</div>
</div>
</div>

<script>
let items=[];

function generateBillNo(){
 const d=new Date();
 return String(d.getDate()).padStart(2,"0")+String(d.getMonth()+1).padStart(2,"0")+String(d.getFullYear()).slice(-2)+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");
}

let billNoValue=generateBillNo();
billNo.innerText=billNoValue;
billDate.innerText=new Date().toLocaleString();
shopName.innerText=localStorage.getItem("shopName")||"My Shop";
shopAddress.innerText=localStorage.getItem("shopAddress")||"";

function focusPrice(){ price.focus(); price.select(); }
window.onload=()=>{ render(); focusPrice(); };

price.addEventListener("keydown",e=>{ if(e.key==="Enter"){ qty.focus(); qty.select(); }});
qty.addEventListener("keydown",e=>{ if(e.key==="Enter"){ disc.focus(); disc.select(); }});
disc.addEventListener("keydown",e=>{ if(e.key==="Enter"){ addItem(); }});

function render(){
 rows.innerHTML="";
 let total=0;

 const hasDiscount=items.some(i=>i.disc>0);

 tableHeader.innerHTML=`
 <th>Price</th>
 <th>Qty</th>
 ${hasDiscount ? '<th>Disc%</th>' : ''}
 <th>Total</th>
 <th class="col-remove">X</th>`;

 items.forEach((item,index)=>{
   const base=item.price*item.qty;
   const final=base-(base*item.disc/100);
   total+=final;

   rows.innerHTML += `
   <tr>
   <td>${item.price.toFixed(2)}</td>
   <td>${item.qty}</td>
   ${hasDiscount ? `<td>${item.disc||''}</td>` : ''}
   <td>${final.toFixed(2)}</td>
   <td class="col-remove"><button class="remove-btn" onclick="removeItem(${index})">✖</button></td>
   </tr>`;
 });

 grand.innerText=total.toFixed(2);
 grandFooter.innerText=total.toFixed(2);

 document.querySelector(".print-total-row td").colSpan = hasDiscount ? 5 : 4;
}

function addItem(){
 const p=parseFloat(price.value);
 const q=parseFloat(qty.value)||1;
 const d=parseFloat(disc.value)||0;
 if(isNaN(p)) return;

 items.push({price:p,qty:q,disc:d});
 render();

 price.value="";
 qty.value="1";
 disc.value="";
 focusPrice();
}

function removeItem(i){ items.splice(i,1); render(); }

function clearBill(){
 items=[];
 render();
 price.value="";
 qty.value="1";
 disc.value="";
 billNoValue=generateBillNo();
 billNo.innerText=billNoValue;
 focusPrice();
}

function printBill(){
 if(items.length===0) return;
 window.print();
}
</script>
</body>
</html>
